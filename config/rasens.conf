# Raspberry Pi C++ Service Configuration
# This file should be installed at /etc/rasens/config.conf

[General]
# Service name
name = rasens

# Logging level: DEBUG, INFO, WARNING, ERROR, CRITICAL
log_level = INFO

# Log file path
log_file = /var/log/rasens/service.log

# PID file path
pid_file = /var/run/rasens.pid

[Network]
# Enable network features
enabled = false

# Port to listen on (if enabled)
port = 8080

# Bind address
bind_address = 0.0.0.0

[GPIO]
# Enable GPIO control
enabled = true

# GPIO pins configuration
# Format: pin_number = mode,direction,initial_value
# mode: input, output, pwm
# direction: in, out
# initial_value: 0 or 1
pin_17 = output,out,0
pin_18 = output,out,0
pin_22 = input,in,0

[Sensors]
poll_interval_ms = 1000
enable_logging = true
ds18b20_enabled = true
ee895_enabled = false
ee895_i2c_bus = 1
ee895_i2c_address = 0x00
ee895_sensor_id = ee895-1

[SDS011]
enabled = false
devices =
